services:
  reciterecipe:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reciterecipe-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/database.sqlite
      - JWT_SECRET=${JWT_SECRET:-reciterecipe-secure-jwt-secret-change-in-production}
      - ADMIN_CODE=${ADMIN_CODE:-admin-secret-2024}
    volumes:
      # Persist database and uploads
      - ./data:/app/data
      - ./uploads:/app/uploads
    networks:
      - reciterecipe-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/recipes', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: reciterecipe-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./uploads:/var/www/uploads:ro
    depends_on:
      - reciterecipe
    networks:
      - reciterecipe-network
    profiles:
      - with-nginx

networks:
  reciterecipe-network:
    driver: bridge

volumes:
  reciterecipe-data:
  reciterecipe-uploads:
